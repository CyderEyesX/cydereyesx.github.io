name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PREVIEW_DIR="preview/pr-${{ github.event.number }}"
          if [ -d "$PREVIEW_DIR" ]; then
            git rm -rf "$PREVIEW_DIR"
            git commit -m "chore: remove preview for PR #${{ github.event.number }}"
            git push
          else
            echo "Preview directory $PREVIEW_DIR not found, nothing to clean up."
          fi

      - name: Update PR comment to mark preview removed
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: existing.body.replace('| **Status** | Active |', '| **Status** | Removed (PR closed) |'),
              });
            }
