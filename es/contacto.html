<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - CyderEyesX</title>
    <link rel="stylesheet" href="../styles.css">
    <!-- SimpleAnalytics Tracking -->
    <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" /></noscript>
</head>
<body>
    <header>
        <h1>🤖 CyderEyesX</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="contacto.html">Contacto</a>
            <a href="../index.html">English</a>
        </nav>
    </header>

    <main style="max-width: 600px; margin: 2rem auto; padding: 2rem;">
        <h2>Ponte en Contacto</h2>
        <p>¿Tienes preguntas sobre nuestros agentes AI? ¿Quieres unirte a nuestra lista de espera? ¡Envíanos un mensaje!</p>
        
        <form action="https://send.pageclip.co/api_PW7RUMzaMGC40TaLTsDQkC91lTaRSyAs" 
              class="pageclip-form" 
              method="post" 
              style="background: #f9f9f9; padding: 2rem; border-radius: 8px; margin-top: 2rem;">
          
          <div style="margin-bottom: 1.5rem;">
            <label for="nombre" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Nombre *</label>
            <input type="text" 
                   id="nombre" 
                   name="name" 
                   required 
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
          </div>
          
          <div style="margin-bottom: 1.5rem;">
            <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email *</label>
            <input type="email" 
                   id="email" 
                   name="email" 
                   required 
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
          </div>
          
          <div style="margin-bottom: 1.5rem;">
            <label for="asunto" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Asunto</label>
            <input type="text" 
                   id="asunto" 
                   name="subject" 
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
          </div>
          
          <div style="margin-bottom: 1.5rem;">
            <label for="mensaje" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Mensaje *</label>
            <textarea id="mensaje" 
                      name="message" 
                      rows="6" 
                      required
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; resize: vertical;"></textarea>
          </div>
          
          <button type="submit" 
                  class="pageclip-form__submit"
                  style="width: 100%; padding: 0.75rem; background: #0066cc; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: 600;">
            Enviar Mensaje
          </button>
        </form>

        <script src="https://s.pageclip.co/v1/pageclip.js" charset="utf-8"></script>
        
        <p style="margin-top: 2rem; text-align: center; color: #666;">
            Los mensajes se envían a: <strong>info@cydereyesx.com</strong>
        </p>
    </main>

    <footer style="text-align: center; padding: 2rem; color: #666;">
        <p>&copy; 2026 CyderEyesX LLC. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
