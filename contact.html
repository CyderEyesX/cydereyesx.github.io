<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - CyderEyesX</title>
    <link rel="stylesheet" href="styles.css">
    <!-- SimpleAnalytics Tracking -->
    <script async defer src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
    <noscript><img src="https://queue.simpleanalyticscdn.com/noscript.gif" alt="" referrerpolicy="no-referrer-when-downgrade" /></noscript>
</head>
<body>
    <header>
        <h1>🤖 CyderEyesX</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
            <a href="es/index.html">Español</a>
        </nav>
    </header>

    <main style="max-width: 600px; margin: 2rem auto; padding: 2rem;">
        <h2>Get in Touch</h2>
        <p>Have questions about our AI agents? Want to join our waitlist? Send us a message!</p>
        
        <form action="https://send.pageclip.co/api_PW7RUMzaMGC40TaLTsDQkC91lTaRSyAs" 
              class="pageclip-form" 
              method="post" 
              style="background: #f9f9f9; padding: 2rem; border-radius: 8px; margin-top: 2rem;">
          
          <div style="margin-bottom: 1.5rem;">
            <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Name *</label>
            <input type="text" 
                   id="name" 
                   name="name" 
                   required 
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
          </div>
          
          <div style="margin-bottom: 1.5rem;">
            <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email *</label>
            <input type="email" 
                   id="email" 
                   name="email" 
                   required 
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
          </div>
          
          <div style="margin-bottom: 1.5rem;">
            <label for="subject" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Subject</label>
            <input type="text" 
                   id="subject" 
                   name="subject" 
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
          </div>
          
          <div style="margin-bottom: 1.5rem;">
            <label for="message" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Message *</label>
            <textarea id="message" 
                      name="message" 
                      rows="6" 
                      required
                      style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; resize: vertical;"></textarea>
          </div>
          
          <button type="submit" 
                  class="pageclip-form__submit"
                  style="width: 100%; padding: 0.75rem; background: #0066cc; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: 600;">
            Send Message
          </button>
        </form>

        <script src="https://s.pageclip.co/v1/pageclip.js" charset="utf-8"></script>
        
        <p style="margin-top: 2rem; text-align: center; color: #666;">
            Messages are sent to: <strong>info@cydereyesx.com</strong>
        </p>
    </main>

    <footer style="text-align: center; padding: 2rem; color: #666;">
        <p>&copy; 2026 CyderEyesX LLC. All rights reserved.</p>
    </footer>
</body>
</html>
